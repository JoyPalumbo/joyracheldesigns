<title>Shop</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #f8f7fc;
    color: #333;
}

header {
    background: white;
    padding: 20px 10%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 10px rgba(0,0,0,.08);
}
        nav {
            background: white;
            padding: 20px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        nav a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
        }

.logo {
    font-size: 1.5rem;
    font-weight: bold;
    color: #8a63d2;
}

.hero {
    text-align: center;
    padding: 60px 20px;
    background: linear-gradient(135deg,#f7d9ff,#dbe9ff);
}

.hero h1 {
    font-size: 3rem;
    margin-bottom: 15px;
}

.hero p {
    max-width: 600px;
    margin: auto;
}

.products {
    max-width: 1200px;
    margin: 60px auto;
    /* display: flexbox; */
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(280px,1fr));
    gap: 30px;
    padding: 0 20px;
}

.product {
    background: white;
    width: 300px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,.08);
}

.product img {
    width: 100%;
    height: 270px;
    object-fit: cover;
}

.product-content {
    padding: 20px;
}

.product h3 {
    margin-bottom: 10px;
}

.product p {
    margin-bottom: 15px;
    color: #666;
}

.price {
    font-size: 1.3rem;
    font-weight: bold;
    color: #8a63d2;
    margin-bottom: 15px;
}

.buy-btn {
    display: block;
    text-align: center;
    text-decoration: none;
    background: #8a63d2;
    color: white;
    padding: 12px;
    border-radius: 8px;
    transition: .3s;
}

.buy-btn:hover {
    opacity: .9;
}

footer {
    text-align: center;
    padding: 10px;
    background: #222;
    color: white;
    margin-top: 50px;
}
</style>

</head>
